<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>音声アシスタント</title>
<link rel="manifest" href="{{ base_url }}/static/manifest.json">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #000;
  color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  user-select: none;
}

/* ── スリープオーバーレイ（無効化） ── */
#sleep-overlay { display: none; }

/* ── 通常表示 ── */
#clock-view {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  transition: opacity 0.4s;
  position: relative;
}

#time {
  font-size: clamp(64px, 20vw, 120px);
  font-weight: 200;
  letter-spacing: -2px;
  color: #fff;
}

#date {
  font-size: 16px;
  color: #666;
  letter-spacing: 1px;
}

/* ── マイクインジケーター ── */
#mic-indicator {
  position: fixed;
  top: 12px;
  left: 14px;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #1a1a1a;
  transition: background 0.3s;
}
#mic-indicator.idle       { background: #1a3a1a; }
#mic-indicator.waiting    { background: #22c55e; animation: pulse 0.8s infinite; }
#mic-indicator.processing { background: #3b82f6; animation: pulse 0.5s infinite; }

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

@keyframes fadeIn {
  from { opacity: 0; transform: scale(0.97); }
  to   { opacity: 1; transform: scale(1); }
}

/* ── 音声アシスタントオーバーレイ ── */
#voice-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: #020208;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 24px;
  padding: 40px 28px;
  text-align: center;
  z-index: 45;
  animation: fadeIn 0.3s ease;
}
#voice-overlay.active { display: flex; }

#voice-state-label {
  font-size: 12px;
  color: #444;
  letter-spacing: 2px;
  text-transform: uppercase;
}

#voice-mic-icon {
  font-size: 48px;
  opacity: 0.6;
}

#voice-transcript {
  font-size: clamp(14px, 3.5vw, 18px);
  color: #666;
  min-height: 1.5em;
  max-width: 320px;
  line-height: 1.6;
}

#voice-response {
  font-size: clamp(16px, 4vw, 20px);
  color: #ddd;
  min-height: 2em;
  max-width: 340px;
  line-height: 1.8;
}

.btn-voice-cancel {
  padding: 12px 28px;
  background: transparent;
  border: 1px solid #222;
  border-radius: 12px;
  color: #333;
  font-size: 14px;
  cursor: pointer;
}

/* ── マイクボタン ── */
#mic-btn {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  width: 64px;
  height: 64px;
  background: #111;
  border: 1px solid #222;
  border-radius: 50%;
  font-size: 26px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s, border-color 0.2s;
  z-index: 5;
}
#mic-btn:active { background: #1a3a1a; border-color: #22c55e; }

/* ── トースト通知 ── */
#toast {
  position: fixed;
  bottom: 60px;
  left: 50%;
  transform: translateX(-50%);
  background: #222;
  color: #aaa;
  padding: 8px 16px;
  border-radius: 8px;
  font-size: 12px;
  z-index: 100;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
  white-space: nowrap;
}
#toast.show { opacity: 1; }
</style>
</head>
<body>

<div id="toast"></div>

<!-- スリープオーバーレイ（タップで解除） -->
<div id="sleep-overlay" onclick="wakeScreen()"></div>

<!-- 通常時計表示 -->
<div id="clock-view">
  <div id="time">--:--</div>
  <div id="date"></div>
</div>

<!-- 音声アシスタントオーバーレイ -->
<div id="voice-overlay">
  <div id="voice-state-label">聞いています</div>
  <div id="voice-mic-icon">🎤</div>
  <div id="voice-transcript"></div>
  <div id="voice-response"></div>
  <button class="btn-voice-cancel" onclick="cancelVoice()">キャンセル</button>
</div>

<!-- マイクインジケーター -->
<div id="mic-indicator"></div>

<!-- 音声アシスタント応答音声 -->
<audio id="voice-audio"></audio>

<!-- マイクボタン -->
<button id="mic-btn" onclick="startVoice()">🎤</button>

<script>
const BASE = '{{ base_url }}';

let sleepTimer = null;
const SLEEP_AFTER_MS = 3 * 60 * 1000;
const PIXEL_SHIFT = 12;

// ── 時計 ─────────────────────────────────────────────────────────────────────

const WEEKDAYS = ['日', '月', '火', '水', '木', '金', '土'];

function updateClock() {
  const now = new Date();
  const hh = String(now.getHours()).padStart(2, '0');
  const mm = String(now.getMinutes()).padStart(2, '0');
  document.getElementById('time').textContent = `${hh}:${mm}`;
  document.getElementById('date').textContent =
    `${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()} (${WEEKDAYS[now.getDay()]})`;
}

setInterval(updateClock, 1000);
updateClock();

// ── トースト ─────────────────────────────────────────────────────────────────

let _toastTimer = null;
function showToast(msg, duration = 3000) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), duration);
}

// ── 音声アシスタント（ボタン起動 → Web Speech API → 無音で自動送信）────────────

let voiceState = 'idle'; // idle / session / processing / responding
let _sessionText = '';
let _silenceTimer = null;
let _srRef = null;

// マイクボタン: タップでセッション開始
function startVoice() {
  if (voiceState === 'processing' || voiceState === 'responding') return;
  if (voiceState === 'session') {
    // 再タップで即送信
    if (_srRef) { try { _srRef.stop(); } catch {} }
    else _submitCommand();
    return;
  }
  voiceState = 'session';
  setMicState('waiting');
  showVoiceOverlay();
  wakeScreen(true);
  _sessionText = '';
  fetch(`${BASE}/api/voice/session/clear`, { method: 'POST' }).catch(() => {});
  document.getElementById('voice-transcript').textContent = '話しかけてください...';
  setTimeout(_startWebSpeech, 200);
}

// Web Speech API で音声認識 → 無音になったら自動送信
function _startWebSpeech() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    showToast('このブラウザは音声認識に対応していません');
    cancelVoice();
    return;
  }
  const sr = new SR();
  sr.lang = 'ja-JP';
  sr.continuous = false;
  sr.interimResults = true;
  _srRef = sr;

  sr.onresult = (e) => {
    clearTimeout(_silenceTimer);
    let interim = '';
    for (let i = 0; i < e.results.length; i++) {
      if (e.results[i].isFinal) _sessionText += e.results[i][0].transcript;
      else interim = e.results[i][0].transcript;
    }
    document.getElementById('voice-transcript').textContent =
      (_sessionText + (interim ? ' ' + interim : '')).trim() || '話しかけてください...';
  };

  // 無音検出 → テキストがあれば自動送信、なければキャンセル
  sr.onend = () => {
    _srRef = null;
    if (voiceState !== 'session') return;
    if (_sessionText.trim().length >= 2) {
      _submitCommand();
    } else {
      cancelVoice();
    }
  };

  sr.onerror = (e) => {
    _srRef = null;
    if (e.error === 'not-allowed') { showToast('マイク権限エラー'); cancelVoice(); return; }
    if (voiceState !== 'session') return;
    cancelVoice();
  };

  try {
    sr.start();
    // 最大15秒でタイムアウト
    _silenceTimer = setTimeout(() => { try { sr.stop(); } catch {} }, 15000);
  } catch { cancelVoice(); }
}

async function _submitCommand() {
  clearTimeout(_silenceTimer);
  if (_srRef) { try { _srRef.stop(); } catch {} _srRef = null; }

  const command = _sessionText.trim();
  _sessionText = '';
  if (!command) { cancelVoice(); return; }

  voiceState = 'processing';
  setMicState('processing');
  document.getElementById('voice-state-label').textContent = '考え中...';
  document.getElementById('voice-mic-icon').textContent = '⏳';

  try {
    const r = await fetch(`${BASE}/api/voice/ask`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: command }),
    });
    const data = await r.json();

    voiceState = 'responding';
    document.getElementById('voice-state-label').textContent = '返答中';
    document.getElementById('voice-mic-icon').textContent = '🔊';
    document.getElementById('voice-response').textContent = data.answer;

    const audio = document.getElementById('voice-audio');
    audio.src = data.audio_url;
    audio.play().catch(() => {});
    audio.onended = () => {
      setTimeout(() => {
        if (data.end_session) {
          cancelVoice();
        } else {
          // 続けて聞く
          voiceState = 'session';
          _sessionText = '';
          setMicState('waiting');
          document.getElementById('voice-state-label').textContent = '聞いています';
          document.getElementById('voice-mic-icon').textContent = '🎤';
          document.getElementById('voice-transcript').textContent = '続けてどうぞ...';
          document.getElementById('voice-response').textContent = '';
          _startWebSpeech();
        }
      }, 500);
    };
  } catch { cancelVoice(); }
}

function cancelVoice() {
  clearTimeout(_silenceTimer);
  if (_srRef) { try { _srRef.stop(); } catch {} _srRef = null; }
  _sessionText = '';
  voiceState = 'idle';
  setMicState('idle');
  closeVoiceOverlay();
  const audio = document.getElementById('voice-audio');
  audio.pause(); audio.src = '';
  wakeScreen();
}

function showVoiceOverlay() {
  document.getElementById('voice-overlay').classList.add('active');
  document.getElementById('voice-state-label').textContent = '聞いています';
  document.getElementById('voice-mic-icon').textContent = '🎤';
  document.getElementById('voice-transcript').textContent = '';
  document.getElementById('voice-response').textContent = '';
}

function closeVoiceOverlay() {
  document.getElementById('voice-overlay').classList.remove('active');
}

function setMicState(state) {
  document.getElementById('mic-indicator').className = state;
}

// ── スリープ制御 ──────────────────────────────────────────────────────────────

function wakeScreen(keepOn = false) {
  // 焼きつき防止：表示するたびに位置をわずかにランダムシフト
  const x = Math.floor(Math.random() * PIXEL_SHIFT * 2) - PIXEL_SHIFT;
  const y = Math.floor(Math.random() * PIXEL_SHIFT * 2) - PIXEL_SHIFT;
  document.getElementById('clock-view').style.transform = `translate(${x}px, ${y}px)`;

  document.getElementById('sleep-overlay').classList.add('hidden');

  clearTimeout(sleepTimer);
  if (!keepOn) {
    sleepTimer = setTimeout(sleepScreen, SLEEP_AFTER_MS);
  }
}

function sleepScreen() {
  document.getElementById('sleep-overlay').classList.remove('hidden');
  clearTimeout(sleepTimer);
}

// ── マイクボタン位置: 横向き左右どちらでも同じ物理位置に固定 ──────────────────
function _updateMicPosition() {
  const angle = (screen.orientation && screen.orientation.angle != null)
    ? screen.orientation.angle : (window.orientation || 0);
  const btn = document.getElementById('mic-btn');
  const isLandscape = angle === 90 || angle === 270 || angle === -90;
  if (isLandscape) {
    btn.style.top = '50%';
    btn.style.bottom = 'auto';
    if (angle === 90 || angle === -90) {
      btn.style.right = '20px'; btn.style.left = 'auto';
      btn.style.transform = 'translateY(-50%)';
    } else {
      btn.style.left = '20px'; btn.style.right = 'auto';
      btn.style.transform = 'translateY(-50%)';
    }
  } else {
    btn.style.top = ''; btn.style.bottom = '';
    btn.style.left = ''; btn.style.right = '';
    btn.style.transform = '';
  }
}

window.addEventListener('orientationchange', _updateMicPosition);
if (screen.orientation) screen.orientation.addEventListener('change', _updateMicPosition);
_updateMicPosition();

// ── 起動 ─────────────────────────────────────────────────────────────────────

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register(`${BASE}/static/sw.js`);
}

setMicState('idle');
</script>
</body>
</html>
